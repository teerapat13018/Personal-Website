<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earnings Call Mindmap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    #mm-wrap {
      width: 100%;
      height: 520px;
      position: relative;
    }

    /* markmap overrides for dark theme */
    .markmap-node circle {
      fill: #6d28d9;
      stroke: #a78bfa;
      stroke-width: 2;
    }
    .markmap-node text {
      fill: #e2e8f0 !important;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
    }
    .markmap-link {
      stroke: #4c1d95;
      stroke-opacity: 0.7;
    }

    /* toolbar */
    #toolbar {
      position: absolute;
      top: 10px;
      right: 12px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    #toolbar button {
      background: rgba(109, 40, 217, 0.6);
      border: 1px solid rgba(167, 139, 250, 0.4);
      color: #e2e8f0;
      padding: 5px 11px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.15s;
    }
    #toolbar button:hover {
      background: rgba(109, 40, 217, 0.9);
    }

    /* loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a78bfa;
      font-size: 14px;
      background: #0d0d1a;
    }
  </style>
</head>
<body>
  <div id="mm-wrap">
    <div id="loading">⏳ กำลังโหลด mindmap...</div>
    <div id="toolbar" style="display:none">
      <button onclick="mm.fit()">⊞ Reset View</button>
      <button onclick="expandAll()">➕ Expand All</button>
      <button onclick="collapseAll()">➖ Collapse All</button>
    </div>
    <svg id="mindmap" style="width:100%;height:520px;"></svg>
  </div>

  <!-- markmap autoloader handles all dependencies -->
  <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.17.5/dist/index.js"></script>

  <script>
    // Markdown content injected by Python
    const rawMarkdown = `MINDMAP_MARKDOWN`;

    let mm = null;

    window.markmap.autoLoader.onReady = async function() {
      try {
        const { Markmap, loadCSS, loadJS }  = window.markmap;
        const { Transformer }               = window.markmap;

        const transformer = new Transformer();
        const { root, features } = transformer.transform(rawMarkdown);

        const { styles, scripts } = transformer.getUsedAssets(features);
        if (styles?.length)  loadCSS(styles);
        if (scripts?.length) await loadJS(scripts, { getMarkmap: () => window.markmap });

        document.getElementById("loading").style.display = "none";
        document.getElementById("toolbar").style.display = "flex";

        mm = Markmap.create("#mindmap", {
          color: (node) => {
            const palette = ["#7c3aed","#6d28d9","#818cf8","#a78bfa","#c4b5fd"];
            return palette[node.depth % palette.length];
          },
          duration:  400,
          maxWidth:  280,
          zoom:      true,
          pan:       true,
          initialExpandLevel: 2,
        }, root);

      } catch(err) {
        document.getElementById("loading").textContent =
          "❌ โหลด mindmap ไม่ได้: " + err.message;
      }
    };

    function expandAll() {
      if (mm) {
        mm.setData(mm.state.data);
        mm.fit();
      }
    }

    function collapseAll() {
      if (mm) {
        function collapse(node) {
          if (node.children?.length) {
            node.payload = { ...node.payload, fold: 1 };
            node.children.forEach(collapse);
          }
        }
        const data = mm.state.data;
        data.children?.forEach(collapse);
        mm.setData(data);
      }
    }
  </script>
</body>
</html>
