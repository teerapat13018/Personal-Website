<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earnings Call Mindmap</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d1a;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    /* Toolbar */
    #toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: #12122a;
      border-bottom: 1px solid rgba(124, 58, 237, 0.25);
    }
    #toolbar button {
      background: rgba(109, 40, 217, 0.55);
      border: 1px solid rgba(167, 139, 250, 0.35);
      color: #e2e8f0;
      padding: 5px 13px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #toolbar button:hover { background: rgba(109, 40, 217, 0.9); }

    /* Markmap container */
    #mm-container {
      width: 100%;
      height: 480px;
    }
    .markmap {
      width: 100%;
      height: 480px;
    }

    /* Markmap dark-theme overrides */
    .markmap-node circle {
      fill: #6d28d9 !important;
      stroke: #a78bfa !important;
      stroke-width: 2 !important;
    }
    .markmap-node text {
      fill: #e2e8f0 !important;
      font-size: 13px !important;
    }
    .markmap-link {
      stroke: #5b21b6 !important;
      stroke-opacity: 0.7 !important;
    }
    svg.markmap { background: #0d0d1a !important; }
  </style>
</head>
<body>

  <div id="toolbar">
    <button onclick="fitMM()">⊞ Reset View</button>
    <button onclick="expandMM()">➕ Expand All</button>
    <button onclick="collapseMM()">➖ Collapse All</button>
  </div>

  <div id="mm-container">
    <!--
      markmap-autoloader scans for div.markmap and renders automatically.
      The markdown is placed in a <script type="text/template"> inside it.
    -->
    <div class="markmap">
      <script type="text/template">
MINDMAP_MARKDOWN
      </script>
    </div>
  </div>

  <!-- markmap autoloader — handles all deps automatically -->
  <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.17.5/dist/index.js"></script>

  <script>
    // Give autoloader time to finish, then grab the mm instance
    let _mm = null;

    function _getMMInstance() {
      // markmap-autoloader stores instances on the SVG element
      const svg = document.querySelector('svg.markmap');
      if (!svg) return null;
      return svg.__markmap || null;
    }

    function fitMM() {
      const mm = _getMMInstance();
      if (mm) mm.fit();
    }

    function expandMM() {
      const mm = _getMMInstance();
      if (!mm) return;
      function expand(node) {
        if (node.payload) node.payload.fold = 0;
        (node.children || []).forEach(expand);
      }
      expand(mm.state.data);
      mm.setData(mm.state.data);
      mm.fit();
    }

    function collapseMM() {
      const mm = _getMMInstance();
      if (!mm) return;
      function collapse(node, depth) {
        if (depth > 1 && node.children?.length) node.payload = { ...node.payload, fold: 1 };
        (node.children || []).forEach(c => collapse(c, depth + 1));
      }
      collapse(mm.state.data, 0);
      mm.setData(mm.state.data);
      mm.fit();
    }
  </script>
</body>
</html>
